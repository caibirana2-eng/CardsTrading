<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Own Sets</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/ownsets.css') }}">
    </head>
    <body>
        <div class="navblankbar"></div>
        <div class="divider"></div>
        <div class="pagecontent">
            <h1>My Sets</h1>
            <label for="makeset">Create a set:</label>
            <form id="makeset" method="post" action="/ownsets">
                <input type="text" placeholder="Set name..." value="" name="makesetname">
                <input type="submit" value="Create" name="confirmmakeset">
            </form>
            <p>{{ error }}</p>
            {% for sets in shownsets %}
            <div class="section">
                <h2>{{ sets }}</h2>
                    <div class="sidebyside">
                        <form method="POST" action="/ownsets">
                            <input type="hidden" name="deletesetname" value="{{ sets }}">
                            <input type="submit" name="deleteset" value="Delete">
                        </form>
                        <form method="POST" action="/cardsearch">
                            <input type="hidden" name="viewsetname" value="{{ sets }}">
                            <input type="submit" value="View Cards">
                        </form>
                    </div>
            </div>
            {% endfor %}
        </div>
        <br>
        <div class="divider"></div>
        <nav class="navlinkbar">
            <a href="{{ url_for('index') }}" class="navlink">HOME</a>
            <a href="{{ url_for('instructionsmanual') }}" class="navlink">HELP</a>
            <a href="{{ url_for('cardsearch') }}" class="navlink">ALL CARDS</a>
            <a href="{{ url_for('ownsets') }}" class="navlink">OWN SETS</a>
            <a href="{{ url_for('contact') }}" class="navlink">CONTACT US</a>
            <a href="{{ url_for('usersettings') }}" class="navlink">SETTINGS</a>
        </nav>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/makeaccount.css') }}">
    </head>
    <body>
        <div class="divider"></div>
        <div class="accoutncreationbox">
            <h1>Bobo Cards Tracker!</h1>    
            <h2>Log in</h2>
            <form method="POST" action="/makeaccount" class="userpassinput">
                <div>
                    <input type="text" name="usernametype" placeholder="Username here..." value="">
                    <input type="text" name="passwordtype" placeholder="Password here..." value="">
                </div>
                <div>
                    <input type="submit" name="confirmlogin" value="Confirm">
                </div>
            </form>
            <div>
                <a href="{{ url_for('signupcode') }}">Back</a>
            </div>
            <p>{{  errormessage  }}</p>
        </div>
    </body>
</html>

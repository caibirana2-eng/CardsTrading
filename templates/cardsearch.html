<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Home</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/cardsearch.css') }}">
    </head>
    <body>
        <nav>
        <form method="POST" action="/cardsearch" class="navsearchbar">
            <input type="text" name="navsearch" placeholder="Search for cards!" value="" class="navsearchbartext">
            <input type="submit" name="confirmnavsearch" value="Search">
        </form>
        <form method="POST" action="/cardsearch" class="navfilterbar" name="filtersets">
            <div>
                <label for="setfilter">Set:</label>
                <select id="setfilter" name="setfilter">
                    <option value="anyset">ALL</option>
                  {% for set in sets %}
                    <option value="{{ set[0] }}">{{ set[0] }}</option>
                  {% endfor %}
                </select>
            </div>
            <div>
                <label for="pricefilter">Avg Price:</label>
                <select id="pricefilter" name="pricefilter">
                    <option value="higher">higher than</option>
                    <option value="lower">lower than</option>
                </select>
                <input type="number" name="priceinput" value=0>
            </div>
            <div>
                <label for="releaseearlylate">Release Year:</label>
                <select id="releaseearlylate" name="releaseearlylate">
                    <option value="later">later than</option>
                    <option value="earlier">earlier than</option>
                </select>
                <select id="releaseyear" name="releaseyear">
                    {% for year in releaseyears %}
                        <option value="{{ year[0] }}">{{ year[0] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="dataearlylate">Data Recency:</label>
                <select id="dataearlylate" name="dateearlylate">
                    <option value="later">later than</option>
                    <option value="earlier">earlier than</option>
                </select>
                <select id="datayear" name="datayear">
                    {% for year in datayears %}
                        <option value="{{ year[0] }}">{{ year[0] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="navfilterconfirm">
                <input type="submit" value="Run Filter" name="runfilter">
            </div>
        </form>
        </nav>
        <br>
        <br>
        <div class="divider"></div>
        {% if selectedsetname %}
            <p>Showing cards from set: {{ selectedsetname }}</p>
        {% endif %}
        <br>
        <div class="allshowncards">
        <form method="POST" action="/cardsearch">
            {% for card in showncards %}
                {% if card in storedcards and card[0] != "EXTRAYEARS23048239047234823049328409" %}
                    <button type="submit" name="card" value="{{ card[0] }}" class="cardimg">
                        <img src="static/cardimages/{{ card[0] }}">
                    </button>
                {% endif %}
            {% endfor %}
        </form>
        </div>
        <div class="divider"></div>
        <nav class="navlinkbar">
            <a href="{{ url_for('index') }}" class="navlink">HOME</a>
            <a href="{{ url_for('instructionsmanual') }}" class="navlink">HELP</a>
            <a href="{{ url_for('cardsearch') }}" class="navlink">ALL CARDS</a>
            <a href="{{ url_for('ownsets') }}" class="navlink">OWN SETS</a>
            <a href="{{ url_for('contact') }}" class="navlink">CONTACT US</a>
            <a href="{{ url_for('usersettings') }}" class="navlink">SETTINGS</a>
        </nav>
    </body>
</html>

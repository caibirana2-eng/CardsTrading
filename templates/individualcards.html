<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Home</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/individualcards.css') }}">
    </head>
    <body>
        <nav>
        <form method="POST" action="/individualcards" class="navsearchbar">
            <input type="text" name="navsearch" placeholder="Search for cards!" value="" class="navsearchbartext">
            <input type="submit" name="confirmnavsearch" value="Search">
        </form>
        </nav>
        <br>
        <div class="divider"></div>
        <div class="cardinfo">
            <div class="sidebyside">
                <div class="cardimg"><img src="static/cardimages/{{ cardpage }}"></div>
                <div class="cardinfobox">
                    <p>Page last updated: {{ carddatarecency }}</p>
                    <p>Card Name: {{ cardname }}</p>
                    <p>Set: {{ cardset }}</p>
                    <p>Release Date: {{ cardreleaseyear }}</p>
                    <p>Description: {{ carddesc }}</p>
                    <p>Current Price Average: {{ avgcardprice }}</p>
                    <p>Market Trend:</p>
                    <img src="static/cardtrends/{{ cardtrend }}" class="trendimg">
                </div>    
            </div>
            <div class="marketlistings">
                <p>Market Listings:</p>
                <img src="static/cardlistings/{{ cardlistings }}" class="marketlistingsimg">
            </div>
        </div>
        <br>
        <div class="divider"></div>
        <nav class="navlinkbar">
            <a href="{{ url_for('index') }}" class="navlink">HOME</a>
            <a href="{{ url_for('instructionsmanual') }}" class="navlink">HELP</a>
            <a href="{{ url_for('cardsearch') }}" class="navlink">ALL CARDS</a>
            <a href="{{ url_for('ownsets') }}" class="navlink">OWN SETS</a>
            <a href="{{ url_for('contact') }}" class="navlink">CONTACT US</a>
            <a href="{{ url_for('usersettings') }}" class="navlink">SETTINGS</a>
        </nav>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/makeaccount.css') }}">
    </head>
    <body>
        <div class="divider"></div>
        <div class="accountcreationbox">   
            <h2>Set your account details!</h2>
            <form method="POST" action="/makeaccount" class="userpassinput">
                <br>
                <div>
                    <input type="text" name="createusernametype" placeholder="Username here..." value="">
                </div>
                <br>
                <div>
                    <input type="text" name="createpasswordtype" placeholder="Password here..." value="">
                </div>
                <br>
                <div>
                    <input type="submit" name="confirmlogin" value="Confirm">
                </div>
            </form>
            <div class="divider">
                <a href="{{ url_for('signupcode') }}">Back</a>
            </div>
            <p>{{  errormessage  }}</p>
        </div>
    </body>
</html>

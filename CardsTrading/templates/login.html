<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    </head>
    <body>
        <div class="divider"></div>
        <div class="loginbox">
            <h1>Bobo Cards Tracker!</h1>    
            <h2>Log in</h2>
            <form method="post" action="/" class="userpassinput">
                <div>
                    <input type="text" name="usernametype" placeholder="Username here..." value="">
                    <input type="text" name="passwordtype" placeholder="Password here..." value="">
                </div>
                <div>
                    <input type="submit" name="confirmlogin" value="Confirm">
                </div>
            </form>
            <div class="sidebyside">
                <div>
                    <a href="{{ url_for('signup') }}">Have no account?</a>
                </div>
                <div>
                    <a href="/">Forgot your password?</a>
                </div>
            </div>
            <p>{{  errormessage  }}</p>
        </div>
    </body>
</html>
